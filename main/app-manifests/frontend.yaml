apiVersion: v1
kind: ServiceAccount
metadata:
  name: ui
  namespace: retail-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ui
  namespace: retail-app
data:
  RETAIL_UI_THEME: default
  RETAIL_UI_ENDPOINTS_CATALOG: http://catalog.retail-app.svc.cluster.local
  RETAIL_UI_ENDPOINTS_CARTS: http://carts.retail-app.svc.cluster.local
  RETAIL_UI_ENDPOINTS_ORDERS: http://orders.retail-app.svc.cluster.local
  RETAIL_UI_SEARCH_ENABLED: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: retail-app
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      serviceAccountName: ui
      containers:
        - name: ui
          image: "public.ecr.aws/aws-containers/retail-store-sample-ui:1.6.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_OPTS
              value: -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
          envFrom:
            - configMapRef:
                name: ui
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
