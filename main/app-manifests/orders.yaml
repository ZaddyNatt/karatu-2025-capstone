apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders
  namespace: retail-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orders
  namespace: retail-app
data:
  RETAIL_ORDERS_MESSAGING_PROVIDER: rabbitmq
  RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES: orders-rabbitmq:5672
  RETAIL_ORDERS_PERSISTENCE_PROVIDER: postgres
  RETAIL_ORDERS_PERSISTENCE_ENDPOINT: project-bedrock-postgres.c49wwquaihhd.us-east-1.rds.amazonaws.com:5432
  RETAIL_ORDERS_PERSISTENCE_NAME: bedrockdb
---
apiVersion: v1
kind: Secret
metadata:
  name: orders-db
  namespace: retail-app
type: Opaque
stringData:
  RETAIL_ORDERS_PERSISTENCE_USERNAME: bedrock_admin
  RETAIL_ORDERS_PERSISTENCE_PASSWORD: BedrockSecure2025!
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: retail-app
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: orders
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      serviceAccountName: orders
      containers:
        - name: orders
          image: "public.ecr.aws/aws-containers/retail-store-sample-orders:1.6.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_OPTS
              value: -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
          envFrom:
            - configMapRef:
                name: orders
            - secretRef:
                name: orders-db
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-rabbitmq
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-rabbitmq
  template:
    metadata:
      labels:
        app: orders-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: "public.ecr.aws/docker/library/rabbitmq:3-management"
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: http
              containerPort: 15672
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: orders-rabbitmq
  namespace: retail-app
spec:
  ports:
    - port: 5672
      name: amqp
    - port: 15672
      name: http
  selector:
    app: orders-rabbitmq
